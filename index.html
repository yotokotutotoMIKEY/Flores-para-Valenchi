<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Flores para ti amor</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;padding:0;overflow:hidden;background:#000;width:100%;height:100%;touch-action:none;}
    #starCanvas,#canvas{position:absolute;top:0;left:0;display:block;width:100%;height:100%;}
    #starCanvas{z-index:0;}
    #canvas{z-index:1;}

    .love-text{
      position:absolute;
      font-size:clamp(18px,5vw,28px);
      font-weight:bold;
      color:#fff;
      text-shadow:0 0 10px #ff33cc,0 0 15px #33ffff;
      pointer-events:none;
      z-index:3;
      animation:floatUp 2.5s forwards;
      white-space:nowrap;
    }
    @keyframes floatUp{
      0%{opacity:1;transform:translateY(0) scale(1);}
      50%{opacity:1;transform:translateY(-40px) scale(1.2);}
      100%{opacity:0;transform:translateY(-100px) scale(0.8);}
    }

    .heart{
      position:absolute;width:15px;height:15px;
      background:red;transform:rotate(-45deg);
      animation:beat 0.8s infinite;z-index:2;
    }
    .heart:before,.heart:after{content:"";position:absolute;width:15px;height:15px;background:red;border-radius:50%;}
    .heart:before{top:-7.5px;left:0;}
    .heart:after{left:7.5px;top:0;}
    @keyframes beat{
      0%,100%{transform:rotate(-45deg) scale(1);}
      50%{transform:rotate(-45deg) scale(1.4);}
    }

    #clearBtn{
      position:fixed;bottom:25px;right:25px;
      padding:clamp(14px,3vw,18px) clamp(18px,4vw,26px);
      font-size:clamp(15px,4vw,18px);
      font-weight:bold;
      background:#ff4081;color:white;border:none;
      border-radius:14px;cursor:pointer;z-index:5;
      box-shadow:0 0 15px #ff80ab;transition:0.3s;
      -webkit-appearance:none;
    }
    #clearBtn:active{background:#f50057;transform:scale(1.05);}

    #startOverlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,0.80);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      z-index:10;cursor:pointer;
    }
    #startOverlay p{
      color:#fff;
      font-size:clamp(22px,7vw,34px);
      text-align:center;
      padding:0 30px;
      text-shadow:0 0 14px #ff33cc,0 0 30px #ff33cc;
      animation:pulse 1.5s infinite;
      font-family:sans-serif;
      line-height:1.5;
    }
    @keyframes pulse{
      0%,100%{opacity:1;}
      50%{opacity:0.4;}
    }
  </style>
</head>
<body>

  <canvas id="starCanvas"></canvas>
  <canvas id="canvas"></canvas>
  <button id="clearBtn">🧹 Limpiar</button>

  <!-- OVERLAY DE INICIO -->
  <div id="startOverlay">
    <p><br>Toca la pantalla <br>Flores Pa ti Bobi 💕<br></p>
  </div>

  <!-- SHADER FLORES -->
  <script type="x-shader/x-fragment" id="fragmentShader">
    #define PI 3.14159265359
    uniform float u_ratio;
    uniform vec2 u_cursor;
    uniform float u_stop_time;
    uniform float u_clean;
    uniform vec2 u_stop_randomizer;
    uniform sampler2D u_texture;
    varying vec2 vUv;

    vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
    vec2 mod289(vec2 x){return x-floor(x*(1./289.))*289.;}
    vec3 permute(vec3 x){return mod289(((x*34.)+1.)*x);}
    float snoise(vec2 v){
      const vec4 C=vec4(.211324865405187,.366025403784439,-.577350269189626,.024390243902439);
      vec2 i=floor(v+dot(v,C.yy));
      vec2 x0=v-i+dot(i,C.xx);
      vec2 i1=(x0.x>x0.y)?vec2(1.,0.):vec2(0.,1.);
      vec4 x12=x0.xyxy+C.xxzz;
      x12.xy-=i1;
      i=mod289(i);
      vec3 p=permute(permute(i.y+vec3(0.,i1.y,1.))+i.x+vec3(0.,i1.x,1.));
      vec3 m=max(.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.);
      m=m*m;m=m*m;
      vec3 x=2.*fract(p*C.www)-1.;
      vec3 h=abs(x)-.5;
      vec3 ox=floor(x+.5);
      vec3 a0=x-ox;
      m*=1.79284291400159-.85373472095314*(a0*a0+h*h);
      vec3 g;
      g.x=a0.x*x0.x+h.x*x0.y;
      g.yz=a0.yz*x12.xz+h.yz*x12.yw;
      return 130.*dot(m,g);
    }

    float get_flower_shape(vec2 _p,float _pet_n,float _angle,float _outline){
      _angle*=3.;
      _p=vec2(_p.x*cos(_angle)-_p.y*sin(_angle),_p.x*sin(_angle)+_p.y*cos(_angle));
      float a=atan(_p.y,_p.x);
      float flower_sectoral_shape=pow(abs(sin(a*_pet_n)),.4)+.25;
      vec2 flower_size_range=vec2(.03,.1);
      float size=flower_size_range[0]+u_stop_randomizer[0]*flower_size_range[1];
      float flower_radial_shape=pow(length(_p)/size,2.);
      flower_radial_shape-=.1*sin(8.*a);
      flower_radial_shape=max(.1,flower_radial_shape);
      float grow_time=step(.25,u_stop_time)*pow(u_stop_time,.3);
      float flower_shape=1.-smoothstep(0.,flower_sectoral_shape,_outline*flower_radial_shape/grow_time);
      flower_shape*=(1.-step(1.,grow_time));
      return flower_shape;
    }

    float get_stem_shape(vec2 _p,vec2 _uv,float _w,float _angle){
      _w=max(.004,_w);
      float x_offset=_p.y*sin(_angle);
      x_offset*=pow(3.*_uv.y,2.);
      _p.x-=x_offset;
      float cursor_horizontal_noise=.5*snoise(2.*_uv*u_stop_randomizer[0]);
      cursor_horizontal_noise*=pow(dot(_p.y,_p.y),.6);
      cursor_horizontal_noise*=pow(dot(_uv.y,_uv.y),.3);
      _p.x+=cursor_horizontal_noise;
      float left=smoothstep(-_w,0.,_p.x);
      float right=1.-smoothstep(0.,_w,_p.x);
      float stem_shape=left*right;
      float grow_time=1.-smoothstep(0.,.2,u_stop_time);
      float stem_top_mask=smoothstep(0.,pow(grow_time,.5),.03-_p.y);
      stem_shape*=stem_top_mask;
      stem_shape*=(1.-step(.17,u_stop_time));
      return stem_shape;
    }

    void main(){
      vec3 base=texture2D(u_texture,vUv).xyz;
      vec2 uv=vUv;uv.x*=u_ratio;
      vec2 cursor=vUv-u_cursor.xy;cursor.x*=u_ratio;
      vec3 stem_color=vec3(.1+u_stop_randomizer[0]*.6,.6,.2);
      vec3 flower_color=vec3(.6+.5*u_stop_randomizer[1],.1,.9-.5*u_stop_randomizer[1]);
      float angle=.5*(u_stop_randomizer[0]-.5);
      float stem_shape=get_stem_shape(cursor,uv,.003,angle);
      float stem_mask=1.-get_stem_shape(cursor,uv,.004,angle);
      float petals_back_number=1.+floor(u_stop_randomizer[0]*2.);
      float flower_back_shape=get_flower_shape(cursor,petals_back_number,angle,1.5);
      float flower_back_mask=1.-get_flower_shape(cursor,petals_back_number,angle,1.6);
      float petals_front_number=2.+floor(u_stop_randomizer[1]*2.);
      float flower_front_shape=get_flower_shape(cursor,petals_front_number,angle,1.);
      float flower_front_mask=1.-get_flower_shape(cursor,petals_front_number,angle,.95);
      vec3 color=base;
      color*=stem_mask;color*=flower_back_mask;color*=flower_front_mask;
      color+=(stem_shape*stem_color);
      color+=(flower_back_shape*(flower_color+vec3(0.,.8*u_stop_time,0.)));
      color+=(flower_front_shape*flower_color);
      color*=u_clean;
      gl_FragColor=vec4(color,1.);
    }
  </script>

  <script type="x-shader/x-vertex" id="vertexShader">
    varying vec2 vUv;
    void main(){vUv=uv;gl_Position=vec4(position,1.);}
  </script>

  <script type="module">
    import * as THREE from "https://cdn.skypack.dev/three@0.133.1/build/three.module";

    const canvasEl = document.querySelector("#canvas");
    const pointer = {x:.5, y:.5, clicked:false};
    let basicMaterial, shaderMaterial;
    const clock = new THREE.Clock();

    let renderer = new THREE.WebGLRenderer({canvas:canvasEl, alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

    let sceneShader = new THREE.Scene();
    let sceneBasic  = new THREE.Scene();
    let camera = new THREE.OrthographicCamera(-1,1,1,-1,0,10);

    let renderTargets = [
      new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight),
      new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight)
    ];

    const musica = new Audio();
    musica.src   = 
    musica.loop   = true;
    musica.volume = 0;
    let musicaIniciada = false;

    function iniciarMusica(){
      if(musicaIniciada) return;
      musicaIniciada = true;
      musica.currentTime = 10;
      musica.play()
        .then(()=> console.log("Música OK ✅"))
        .catch(e => console.warn("Audio bloqueado:", e));
    }

    const phrases = [
      "Te amo","Mi niña","Mi bobi",
      "Wapa","Tierna","Prechiocha",
      "Linda","La mejor","TQM","Te quiero","Te AMO"
    ];

    function showLoveText(x, y){
      const div = document.createElement("div");
      div.className  = "love-text";
      div.innerText  = phrases[Math.floor(Math.random()*phrases.length)];
      div.style.left = `${x}px`;
      div.style.top  = `${y}px`;
      document.body.appendChild(div);
      setTimeout(()=> div.remove(), 2500);
    }

    function showHeart(x, y){
      const h = document.createElement("div");
      h.className    = "heart";
      h.style.left   = `${x-7.5}px`;
      h.style.top    = `${y-7.5}px`;
      document.body.appendChild(h);
      setTimeout(()=> h.remove(), 1500);
    }


    function handleInteraction(x, y){
      pointer.x       = x / window.innerWidth;
      pointer.y       = 1 - y / window.innerHeight;
      pointer.clicked = true;
      showLoveText(x, y);
      showHeart(x, y);
    }

    const overlay = document.getElementById("startOverlay");

    function primeraInteraccion(x, y){
      overlay.style.display = "none";
      iniciarMusica();        
      handleInteraction(x, y);
    }

    overlay.addEventListener("touchstart", (e)=>{
      e.preventDefault();
      const t = e.changedTouches[0];
      primeraInteraccion(t.clientX, t.clientY);
    }, {passive:false});

    overlay.addEventListener("click", (e)=>{
      primeraInteraccion(e.clientX, e.clientY);
    });

    window.addEventListener("touchstart", (e)=>{
      if(overlay.style.display !== "none") return;
      e.preventDefault();
      const t = e.changedTouches[0];
      iniciarMusica();
      handleInteraction(t.clientX, t.clientY);
    }, {passive:false});

    window.addEventListener("click", (e)=>{
      if(overlay.style.display !== "none") return;
      iniciarMusica();
      handleInteraction(e.clientX, e.clientY);
    });

    createPlane();
    updateSize();
    window.addEventListener("resize", updateSize);
    render();

    function createPlane(){
      shaderMaterial = new THREE.ShaderMaterial({
        uniforms:{
          u_stop_time      :{value:0.},
          u_stop_randomizer:{value:new THREE.Vector2(Math.random(),Math.random())},
          u_cursor         :{value:new THREE.Vector2(pointer.x,pointer.y)},
          u_ratio          :{value:window.innerWidth/window.innerHeight},
          u_texture        :{value:null},
          u_clean          :{value:1.},
        },
        vertexShader  : document.getElementById("vertexShader").textContent,
        fragmentShader: document.getElementById("fragmentShader").textContent,
        transparent:true
      });
      basicMaterial = new THREE.MeshBasicMaterial();
      const geo = new THREE.PlaneGeometry(2,2);
      sceneBasic.add(new THREE.Mesh(geo, basicMaterial));
      sceneShader.add(new THREE.Mesh(geo, shaderMaterial));
    }

    function render(){
      shaderMaterial.uniforms.u_texture.value = renderTargets[0].texture;
      if(pointer.clicked){
        shaderMaterial.uniforms.u_cursor.value          = new THREE.Vector2(pointer.x, pointer.y);
        shaderMaterial.uniforms.u_stop_randomizer.value = new THREE.Vector2(Math.random(), Math.random());
        shaderMaterial.uniforms.u_stop_time.value       = 0.;
        pointer.clicked = false;
      }
      shaderMaterial.uniforms.u_stop_time.value += clock.getDelta();
      renderer.setRenderTarget(renderTargets[1]);
      renderer.render(sceneShader, camera);
      basicMaterial.map = renderTargets[1].texture;
      renderer.setRenderTarget(null);
      renderer.render(sceneBasic, camera);
      [renderTargets[0], renderTargets[1]] = [renderTargets[1], renderTargets[0]];
      requestAnimationFrame(render);
    }

    function updateSize(){
      if(shaderMaterial) shaderMaterial.uniforms.u_ratio.value = window.innerWidth/window.innerHeight;
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    document.getElementById("clearBtn").addEventListener("click", ()=>{
      shaderMaterial.uniforms.u_clean.value = 0.;
      setTimeout(()=> shaderMaterial.uniforms.u_clean.value = 1., 50);
      document.querySelectorAll(".love-text,.heart").forEach(el=> el.remove());
    });
  </script>


  <script>
    const starCanvas = document.getElementById("starCanvas");
    const ctx        = starCanvas.getContext("2d");
    let stars = [];

    function initStars(){
      starCanvas.width  = window.innerWidth;
      starCanvas.height = window.innerHeight;
      stars = [];
      for(let i=0;i<200;i++){
        stars.push({
          x    : Math.random()*starCanvas.width,
          y    : Math.random()*starCanvas.height,
          size : Math.random()*2+.5,
          speed: .2+Math.random()*.5
        });
      }
    }

    function animateStars(){
      ctx.clearRect(0,0,starCanvas.width,starCanvas.height);
      for(let s of stars){
        ctx.beginPath();
        ctx.fillStyle  = "white";
        ctx.globalAlpha= .6+.4*Math.sin(Date.now()/500+s.x);
        ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
        ctx.fill();
        s.y += s.speed;
        if(s.y > starCanvas.height){ s.y=0; s.x=Math.random()*starCanvas.width; }
      }
      requestAnimationFrame(animateStars);
    }

    initStars();
    animateStars();
    window.addEventListener("resize", initStars);
  </script>

</body>
</html>
